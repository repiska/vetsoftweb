services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend

  app:
    build: .
    restart: always
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "jdbc:postgresql://db:5432/vetsoft?user=vetsoft&password=${DB_PASSWORD}"
      PORT: "8080"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    restart: always
    # НЕ открываем порт наружу в проде — только через SSH tunnel
    # Для доступа: ssh -L 5433:localhost:5432 user@server
    expose:
      - "5432"
    environment:
      POSTGRES_USER: vetsoft
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: vetsoft
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetsoft"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - backend

  backup:
    image: postgres:16-alpine
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: "${DB_PASSWORD}"
    volumes:
      - ./backups:/backups
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        echo "[$(date)] Starting backup...";
        pg_dump -h db -U vetsoft vetsoft | gzip > /backups/vetsoft_$$(date +%Y%m%d_%H%M).sql.gz;
        echo "[$(date)] Backup complete.";
        find /backups -name "*.sql.gz" -mtime +7 -delete;
        echo "[$(date)] Old backups cleaned. Sleeping 24h...";
        sleep 86400;
      done'
    networks:
      - backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  frontend:
  backend:
